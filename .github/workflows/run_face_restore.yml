name: AI Old Photo Restore System

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgl1 libglib2.0-0

      - name: Create venv and install dependencies
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel

          pip install numpy==1.26.4
          pip install torch==2.0.1 torchvision==0.15.2
          pip install opencv-python-headless==4.8.1.78 pillow==10.4.0
          pip install basicsr==1.4.2 facexlib==0.3.0 realesrgan==0.3.0 gfpgan==1.3.8
          pip install --force-reinstall numpy==1.26.4

      - name: Verify environment
        shell: bash
        run: |
          source .venv/bin/activate
          python - <<'PY'
          import sys
          import numpy
          import torch
          import torchvision
          import cv2

          print("Python:", sys.version)
          print("NumPy:", numpy.__version__)
          print("Torch:", torch.__version__)
          print("TorchVision:", torchvision.__version__)
          print("OpenCV:", cv2.__version__)

          assert numpy.__version__.startswith("1.26."), f"Unexpected NumPy version: {numpy.__version__}"
          PY

      - name: Run restore system
        shell: bash
        run: |
          source .venv/bin/activate
          python scripts/restore_system.py

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-output
          path: output/
